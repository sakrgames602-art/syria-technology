<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="gold-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">سوريا تكنولوجي | المتجر الذهبي</title>
    <meta name="description" content="سوريا تكنولوجي - متجر إلكتروني سوري ذهبي.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d4af37">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23CE1126'/><rect y='33' width='100' height='33' fill='white'/><rect y='66' width='100' height='33' fill='black'/><text x='50' y='55' font-size='25' fill='green' text-anchor='middle' dominant-baseline='middle'>★</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root{--bg:#0a0a0a;--card:#1a1a1a;--text:#ccc;--gold:#d4af37;--gold-l:#f9e076;--hbg:#111;--bor:#333;--sh:0 4px 20px rgba(212,175,55,0.4)}
        [data-theme="gold-dark"]{--bg:#0a0a0a;--card:#1a1a1a;--text:#ccc;--gold:#d4af37;--gold-l:#f9e076;--hbg:#111;--bor:#333}
        [data-theme="white-gold"]{--bg:#f8f8f8;--card:#fff;--text:#333;--gold:#b8860b;--gold-l:#d4af37;--hbg:#fff;--bor:#ddd}
        [data-theme="blue-comfort"]{--bg:#1a2b3c;--card:#243447;--text:#d9e2ec;--gold:#3b82f6;--gold-l:#60a5fa;--hbg:#1e3a5f;--bor:#334155}
        [data-theme="green-nature"]{--bg:#0d1f0d;--card:#1a2f1a;--text:#cbd5c0;--gold:#4ade80;--gold-l:#86efac;--hbg:#0f2f0f;--bor:#2d402d}
        [data-theme="pink-soft"]{--bg:#2d1a26;--card:#3d2636;--text:#e9d5e0;--gold:#f472b6;--gold-l:#f9a8d4;--hbg:#2d1f2a;--bor:#4a2e3f}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);transition:0.4s}
        html[dir="rtl"] body{direction:rtl;text-align:right}
        html[dir="ltr"] body{direction:ltr;text-align:left}
        .container{max-width:1200px;margin:auto;padding:0 20px}
        .header{background:var(--hbg);border-bottom:2px solid var(--gold);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000}
        .logo{font-size:28px;font-weight:900;color:var(--gold)}
        .header-actions{display:flex;gap:15px;align-items:center}
        .cart-icon{position:relative;font-size:28px;color:var(--gold);cursor:pointer}
        .cart-count{position:absolute;top:-10px;right:-15px;background:red;color:white;border-radius:50%;padding:2px 7px;font-size:14px}
        .navbar{background:var(--hbg);border-bottom:1px solid var(--bor);padding:10px 20px;display:flex;gap:15px;flex-wrap:wrap}
        .navbar a{color:var(--gold);text-decoration:none;font-weight:600;padding:5px 10px;border-radius:5px}
        .navbar a.active{background:var(--gold);color:#000}
        .hero{text-align:center;padding:60px 20px;background:linear-gradient(135deg,var(--card),var(--bg))}
        .hero h1{color:var(--gold);font-size:42px}
        .section-title{text-align:center;color:var(--gold);margin:30px 0 20px;font-size:28px}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:25px}
        .product-card{background:var(--card);border:1px solid var(--bor);border-radius:12px;overflow:hidden;transition:0.3s}
        .product-card:hover{border-color:var(--gold);box-shadow:var(--sh);transform:translateY(-5px)}
        .product-card img{width:100%;height:200px;object-fit:cover;border-bottom:2px solid var(--gold);cursor:pointer}
        .product-info{padding:15px}
        .product-title{color:var(--gold);font-size:18px;margin-bottom:8px}
        .product-price{color:var(--gold-l);font-size:22px;font-weight:900}
        .add-to-cart{background:var(--gold);color:#000;border:none;padding:10px;width:100%;font-weight:bold;border-radius:6px;cursor:pointer;margin-top:10px}
        .cart-sidebar{position:fixed;top:0;right:0;width:400px;max-width:100%;height:100vh;background:var(--bg);border-left:2px solid var(--gold);z-index:2000;transform:translateX(100%);transition:0.4s;padding:20px;overflow-y:auto}
        .cart-sidebar.open{transform:translateX(0)}
        .checkout-btn{background:var(--gold);color:#000;width:100%;padding:14px;border:none;margin-top:20px;cursor:pointer;font-weight:bold}
        .whatsapp-float{position:fixed;bottom:25px;right:25px;background:#25D366;color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;animation:pulse 2s infinite;z-index:1500}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,0.7)}70%{box-shadow:0 0 0 25px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0}}
        .admin-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:3000;display:none;justify-content:center;align-items:center}
        .admin-overlay.active{display:flex}
        .admin-panel{background:var(--card);border:2px solid var(--gold);width:95%;max-width:900px;max-height:90vh;overflow-y:auto;padding:25px;border-radius:15px}
        .btn{background:var(--gold);color:#000;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:black;padding:10px 25px;border-radius:30px;font-weight:bold;z-index:9999;opacity:0;transition:0.3s}
        .toast.show{opacity:1;bottom:40px}
    </style>
</head>
<body>
    <div id="announceBar" style="background:var(--hbg);color:var(--gold);text-align:center;padding:5px;"><span id="announceText">🇸🇾 توصيل مجاني لجميع المحافظات للطلبات فوق 500 ألف ل.س</span></div>
    <header class="header">
        <div class="logo"><span>🇸🇾</span> <span id="storeName">سوريا تكنولوجي</span></div>
        <div class="header-actions">
            <input type="text" id="searchInput" placeholder="ابحث..." style="padding:8px;border-radius:20px;border:1px solid var(--gold);background:var(--bg);color:var(--text);width:150px;" oninput="liveSearch()">
            <button onclick="switchLang()" id="langSwitch" style="background:none;border:1px solid var(--gold);color:var(--gold);padding:5px 12px;border-radius:20px;">English</button>
            <span onclick="openAdmin()" style="color:var(--gold);cursor:pointer;font-size:24px;"><i class="fas fa-user-cog"></i></span>
            <div class="cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
        </div>
    </header>
    <nav class="navbar">
        <a href="#" class="active" data-category="all">الكل</a>
        <a href="#" data-category="electronics">إلكترونيات</a>
        <a href="#" data-category="clothing">ملابس</a>
        <a href="#" data-category="home">منزل</a>
        <a href="#" data-category="offers">عروض</a>
    </nav>
    <main>
        <section class="hero"><h1 id="heroTitle">أهلاً بك في سوريا تكنولوجي</h1><p id="heroSub">تسوق براحة بصرية مثالية، أسعار مميزة، وتوصيل سريع لكل سوريا</p></section>
        <div class="container">
            <h2 class="section-title" id="featuredTitle">المنتجات المميزة</h2>
            <div class="products-grid" id="featuredContainer"></div>
            <h2 class="section-title" id="offersTitle">🔥 العروض الخاصة</h2>
            <div class="products-grid" id="offersContainer"></div>
            <h2 class="section-title" id="allTitle">جميع المنتجات</h2>
            <div class="products-grid" id="productsContainer"></div>
        </div>
    </main>
    <aside class="cart-sidebar" id="cartSidebar">
        <h3 style="color:var(--gold);">سلة المشتريات <button onclick="toggleCart()" style="background:none;border:none;color:var(--gold);float:left;">✖</button></h3>
        <div id="cartItems"></div>
        <div id="cartTotal">المجموع: 0 ل.س</div>
        <div style="margin:15px 0;"><input type="text" id="couponCode" placeholder="كود الخصم" style="padding:8px;width:70%;background:var(--bg);color:var(--text);border:1px solid var(--gold);border-radius:5px;"> <button onclick="applyCoupon()" class="btn">تطبيق</button><span id="couponMsg" style="color:var(--gold);margin-right:10px;"></span></div>
        <div><label><input type="radio" name="payment" value="cash" checked> الدفع عند الاستلام</label> <label><input type="radio" name="payment" value="sham"> شام كاش</label></div>
        <select id="shippingZone" style="width:100%;padding:8px;margin:10px 0;background:var(--bg);color:var(--text);border:1px solid var(--gold);border-radius:5px;"><option value="50000">جميع المحافظات (50,000 ل.س)</option><option value="10000">دمشق وريفها (+10,000 ل.س)</option></select>
        <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">إتمام الشراء وإرسال الطلب عبر واتساب</button>
    </aside>
    <a href="https://wa.me/963983849307" target="_blank" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>
    <div class="toast" id="toast"></div>

    <!-- لوحة الإدارة -->
    <div class="admin-overlay" id="adminOverlay">
        <div class="admin-panel">
            <h2 style="color:var(--gold);">⚙️ لوحة الإدارة</h2>
            <div id="adminLogin">
                <input type="password" id="adminPass" placeholder="كلمة المرور" style="width:70%;padding:10px;margin:10px 0;background:var(--bg);border:1px solid var(--gold);color:var(--text);">
                <button class="btn" onclick="loginAdmin()">دخول</button> <button class="btn" onclick="closeAdmin()">إغلاق</button>
            </div>
            <div id="adminContent" style="display:none;">
                <button onclick="loadProducts()" class="btn" style="margin-bottom:10px;">تحديث المنتجات</button>
                <div id="adminProductList"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== الإعدادات ==========
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsv5XDkaFpOIvEW5EbeSUd796YLsSJmM92cnP0SqAEeoxGajtmdy-I1JScXMxlAVCX/exec';
        const DEFAULT_IMG = 'https://via.placeholder.com/400x300/d4af37/000?text=No+Image';
        let currentLang = 'ar';
        let cart = [];
        let currentCategory = 'all';
        let products = [];

        // تحميل المنتجات
        async function loadProducts() {
            try {
                const res = await fetch(SCRIPT_URL + '?action=getProducts');
                products = await res.json();
                renderAll();
            } catch (e) { alert('فشل تحميل المنتجات: ' + e.message); }
        }

        function productCard(p) {
            const name = currentLang === 'ar' ? p.nameAr : p.nameEn;
            return `<div class="product-card">
                <img src="${p.image || DEFAULT_IMG}" alt="${name}" onerror="this.src='${DEFAULT_IMG}'">
                <div class="product-info"><div class="product-title">${name}</div>
                <div class="product-price">${parseInt(p.price).toLocaleString()} ل.س</div>
                <button class="add-to-cart" onclick="addToCart(${p.id})">أضف للسلة</button></div></div>`;
        }

        function renderAll() {
            const feat = products.filter(p => p.featured).slice(0,8);
            document.getElementById('featuredContainer').innerHTML = feat.map(productCard).join('');
            const filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);
            document.getElementById('productsContainer').innerHTML = filtered.map(productCard).join('');
        }

        // السلة
        function addToCart(id) {
            const p = products.find(p => p.id == id); if (!p) return;
            const ex = cart.find(i => i.id == id); if (ex) ex.qty++; else cart.push({...p, qty:1});
            updateCartUI();
        }
        function updateCartUI() {
            const cnt = cart.reduce((s,i) => s + i.qty, 0);
            document.getElementById('cartCount').textContent = cnt;
            document.getElementById('cartItems').innerHTML = cart.map(i => `<div>${currentLang==='ar'?i.nameAr:i.nameEn} (${i.qty}) - ${(i.price*i.qty).toLocaleString()} ل.س</div>`).join('');
            const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
            document.getElementById('cartTotal').textContent = `المجموع: ${total.toLocaleString()} ل.س`;
            localStorage.setItem('cart', JSON.stringify(cart));
        }
        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }

        // الكوبون
        function applyCoupon() {
            const code = document.getElementById('couponCode').value.trim().toUpperCase();
            if (code === 'WELCOME') { alert('خصم 10%') } else { alert('كود غير صالح'); }
        }

        // واتساب
        function checkout() {
            if (cart.length === 0) return alert('السلة فارغة');
            const pay = document.querySelector('input[name="payment"]:checked').value;
            const ship = document.getElementById('shippingZone').value;
            let msg = 'طلب جديد من سوريا تكنولوجي:\n';
            cart.forEach(i => msg += `- ${i.nameAr} (${i.qty}) = ${(i.price*i.qty).toLocaleString()} ل.س\n`);
            const total = cart.reduce((s,i) => s + i.price*i.qty, 0) + parseInt(ship);
            msg += `الإجمالي: ${total.toLocaleString()} ل.س (شحن ${parseInt(ship).toLocaleString()})\nالدفع: ${pay==='cash'?'دفع عند الاستلام':'شام كاش'}`;
            window.open(`https://wa.me/963983849307?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // البحث
        function liveSearch() { /* مبسط */ }

        // اللغة
        function switchLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langSwitch').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            renderAll();
        }

        // الإدارة
        function openAdmin() { document.getElementById('adminOverlay').classList.add('active'); }
        function closeAdmin() { document.getElementById('adminOverlay').classList.remove('active'); }
        async function loginAdmin() {
            const pass = document.getElementById('adminPass').value;
            try {
                const res = await fetch(SCRIPT_URL + '?action=auth&pass=' + pass);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('adminLogin').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    // عرض قائمة المنتجات
                    let list = document.getElementById('adminProductList');
                    list.innerHTML = products.map(p => `<div>${p.nameAr} - ${p.price} ل.س <button onclick="deleteProduct(${p.id})">حذف</button></div>`).join('');
                } else {
                    alert('كلمة المرور خاطئة');
                }
            } catch (e) {
                alert('خطأ في الاتصال بالخادم. تأكد من نشر تطبيق Google Apps Script وأن الإنترنت متصل.');
            }
        }
        async function deleteProduct(id) {
            if (!confirm('حذف المنتج؟')) return;
            await fetch(SCRIPT_URL + `?action=deleteProduct&id=${id}`);
            await loadProducts();
        }

        // تحميل أولي
        loadProducts();
        // استعادة السلة
        if (localStorage.getItem('cart')) cart = JSON.parse(localStorage.getItem('cart'));
        updateCartUI();
        document.getElementById('cartSidebar').classList.remove('open');

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
</body>
</html>
